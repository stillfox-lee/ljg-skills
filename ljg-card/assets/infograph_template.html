<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  :root {
    --bg: #F2F2F2;
    --green: #B8D8BE;
    --green-dark: #8FB89A;
    --pink: #E91E63;
    --yellow: #FFF200;
    --brown: #2D2926;
    --brown-light: #5C5350;
    --white: #FFFFFF;
    --grid-line: rgba(45,41,38,0.06);
    --font: -apple-system, 'PingFang SC', 'Hiragino Sans GB', system-ui, sans-serif;
    --font-mono: 'SF Mono', 'Menlo', 'Monaco', monospace;
    --font-serif: 'Georgia', 'Noto Serif SC', 'Songti SC', serif;

    /* ── Spacing Tokens ── */
    --sp-xs: 8px;
    --sp-sm: 16px;
    --sp-md: 24px;
    --sp-lg: 40px;
    --sp-xl: 56px;
    --sp-2xl: 80px;

    /* ── Canvas Padding (used for full-bleed calc) ── */
    --canvas-px: 48px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1080px;
    background: var(--bg);
  }

  .infograph {
    width: 1080px;
    background: var(--bg);
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 40px 40px;
    position: relative;
  }

  /* ══════════════════════════════════════════
     HEADER
     ══════════════════════════════════════════ */
  .header {
    padding: var(--sp-xl) 60px var(--sp-lg);
    border-bottom: 2px solid var(--brown);
    position: relative;
  }

  .header::before {
    content: '◎';
    position: absolute;
    top: 20px;
    right: 60px;
    font-size: 28px;
    color: var(--pink);
    opacity: 0.6;
  }

  .header::after {
    content: '{{REF_CODE}}';
    position: absolute;
    top: 26px;
    right: 100px;
    font: 400 10px/1 var(--font-mono);
    color: var(--brown-light);
    letter-spacing: 0.15em;
  }

  .header h1 {
    font: 900 64px/1.1 var(--font);
    color: var(--brown);
    letter-spacing: -0.035em;
    margin-bottom: 12px;
  }

  .header .subtitle {
    font: 400 20px/1.6 var(--font);
    color: var(--brown-light);
    padding-left: 4px;
  }

  .header .ruler {
    display: flex;
    gap: 0;
    margin-top: 20px;
    height: 16px;
    align-items: flex-end;
  }

  .header .ruler span {
    display: block;
    width: 40px;
    border-left: 1px solid var(--brown);
    height: 8px;
    font: 400 7px/1 var(--font-mono);
    color: var(--brown-light);
    padding-left: 2px;
    padding-top: 9px;
  }

  .header .ruler span:nth-child(5n+1) {
    height: 16px;
  }

  /* ══════════════════════════════════════════
     CANVAS
     ══════════════════════════════════════════ */
  .canvas {
    padding: var(--sp-lg) var(--canvas-px);
  }

  /* ══════════════════════════════════════════
     TYPOGRAPHY UTILITIES
     ══════════════════════════════════════════ */

  /* Section Labels — uppercase mono micro-labels */
  .label {
    font: 400 10px/1 var(--font-mono);
    color: var(--brown-light);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: var(--sp-md);
  }

  .label--green { color: var(--green); }
  .label--pink { color: var(--pink); }

  /* Body text */
  .body {
    font: 400 16px/1.8 var(--font);
    color: #4a4a4a;
    max-width: 62ch;
  }

  .body strong {
    color: var(--brown);
    font-weight: 700;
  }

  /* Big numbers — hero metrics */
  .big-num {
    font: 900 52px/1 var(--font-mono);
    color: var(--brown);
    letter-spacing: -0.04em;
  }

  .big-num--lg {
    font-size: 72px;
  }

  .big-num .unit {
    font: 400 18px/1 var(--font);
    color: var(--brown-light);
    margin-left: 4px;
  }

  /* Highlight /荧光笔 */
  mark {
    background: rgba(255,242,0,0.35);
    color: inherit;
    padding: 1px 4px;
  }

  /* Inline tag / badge */
  .tag {
    display: inline-block;
    padding: 4px 12px;
    font: 600 12px/1.5 var(--font);
    color: var(--brown);
    border-left: 3px solid var(--pink);
    background: rgba(255,242,0,0.1);
  }

  .tag--dark {
    background: rgba(184,216,190,0.1);
    border-left-color: var(--green);
    color: var(--white);
  }

  /* Serif accent for quotes */
  .serif {
    font-family: var(--font-serif);
  }

  /* ══════════════════════════════════════════
     LAYOUT UTILITIES
     ══════════════════════════════════════════ */

  /* Full-bleed strip — breaks out of canvas padding */
  .full-bleed {
    margin-left: calc(-1 * var(--canvas-px));
    margin-right: calc(-1 * var(--canvas-px));
    padding-left: var(--canvas-px);
    padding-right: var(--canvas-px);
  }

  /* Dark strip */
  .strip-dark {
    background: var(--brown);
    color: var(--white);
  }

  /* Green strip */
  .strip-green {
    background: var(--green);
  }

  /* Spacers */
  .gap-sm { height: var(--sp-sm); }
  .gap-md { height: var(--sp-md); }
  .gap-lg { height: var(--sp-lg); }
  .gap-xl { height: var(--sp-xl); }

  /* Dividers */
  .divider {
    border: none;
    border-top: 1px solid rgba(45,41,38,0.1);
    margin: var(--sp-lg) 0;
  }

  .divider--heavy {
    border-top: 2px solid var(--brown);
  }

  /* ══════════════════════════════════════════
     FOOTER
     ══════════════════════════════════════════ */
  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--sp-sm) var(--sp-lg) 28px;
    border-top: 1px solid rgba(45,41,38,0.1);
  }

  .footer .author {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .footer .avatar {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    object-fit: cover;
  }

  .footer .author-name {
    font: 400 12px/1.5 var(--font);
    color: var(--brown-light);
  }

  .footer .watermark {
    font: 400 9px/1 var(--font-mono);
    color: rgba(45,41,38,0.25);
    letter-spacing: 0.1em;
  }

  .footer .arxiv {
    font: 400 11px/1.5 var(--font-mono);
    color: var(--brown-light);
    letter-spacing: 0.02em;
  }

  /* ══════════════════════════════════════════
     REGISTRATION MARKS
     ══════════════════════════════════════════ */
  .infograph::before {
    content: '';
    position: absolute;
    top: 10px;
    left: 10px;
    width: 16px;
    height: 16px;
    border-top: 1px solid rgba(45,41,38,0.18);
    border-left: 1px solid rgba(45,41,38,0.18);
    z-index: 1;
  }

  .infograph::after {
    content: '';
    position: absolute;
    bottom: 10px;
    right: 10px;
    width: 16px;
    height: 16px;
    border-bottom: 1px solid rgba(45,41,38,0.18);
    border-right: 1px solid rgba(45,41,38,0.18);
    z-index: 1;
  }

  /* ══════════════════════════════════════════
     CUSTOM CSS — content-specific styles below
     ══════════════════════════════════════════ */
  {{CUSTOM_CSS}}
</style>
</head>
<body>
  <div class="infograph">
    <div class="header">
      <h1>{{TITLE}}</h1>
      <p class="subtitle">{{SUBTITLE}}</p>
      <div class="ruler">
        <span>0</span><span></span><span></span><span></span><span></span>
        <span>5</span><span></span><span></span><span></span><span></span>
        <span>10</span><span></span><span></span><span></span><span></span>
        <span>15</span><span></span><span></span><span></span><span></span>
        <span>20</span><span></span><span></span><span></span><span></span>
      </div>
    </div>
    <div class="canvas">
      {{CONTENT_HTML}}
    </div>
    <div class="footer">
      <div class="author">
        <img class="avatar" src="file:///Users/lijigang/.claude/skills/ljg-card/assets/logo.png" alt="">
        <span class="author-name">{{SOURCE}}</span>
      </div>
      {{ARXIV_LINE}}
    </div>
  </div>
</body>
</html>
